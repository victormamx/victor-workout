<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VMW">
  <meta name="theme-color" content="#F5F0E8">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <title>Victor Mac Workout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:#F5F0E8;--cream2:#EDE7D9;--cream3:#DDD5C0;
      --ink:#1A1A18;--ink2:#3D3D38;--ink3:#7A7A72;
      --sage:#7A9E7E;--terra:#C4714A;--dust:#C4A96B;
      --border:rgba(26,26,24,0.1);--shadow:0 2px 12px rgba(26,26,24,0.07);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{background:var(--cream);color:var(--ink);font-family:'Barlow',sans-serif;min-height:100vh;min-height:-webkit-fill-available;overscroll-behavior:none;overflow-x:hidden;}
    .bg-doodles{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;overflow:hidden;}
    #splash{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh;min-height:-webkit-fill-available;padding:env(safe-area-inset-top,44px) 20px env(safe-area-inset-bottom,24px);}
    .home-header{padding-top:16px;margin-bottom:24px;}
    .home-eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px;}
    .home-title{font-family:'Barlow Condensed',sans-serif;font-size:56px;font-weight:900;line-height:.9;text-transform:uppercase;color:var(--ink);}
    .home-title span{color:var(--terra);}
    .week-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:20px;background:var(--cream2);border-radius:16px;padding:10px 6px;border:1px solid var(--border);}
    .week-dot{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;}
    .week-dot-circle{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;border:1.5px solid transparent;transition:transform .15s;}
    .week-dot:active .week-dot-circle{transform:scale(.88);}
    .week-dot-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;}
    .day-cards{display:flex;flex-direction:column;gap:9px;}
    .day-card{background:white;border:1px solid var(--border);border-radius:18px;overflow:hidden;cursor:pointer;box-shadow:var(--shadow);transition:transform .15s;}
    .day-card:active{transform:scale(.985);}
    .day-card-inner{display:flex;align-items:center;padding:13px 15px;gap:13px;}
    .day-card-accent{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:.05em;}
    .day-card-info{flex:1;min-width:0;}
    .day-card-day{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--ink3);margin-bottom:1px;}
    .day-card-muscle{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;text-transform:uppercase;letter-spacing:.02em;line-height:1;}
    .day-card-sub{font-size:11px;color:var(--ink3);margin-top:2px;}
    .day-card-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
    .day-card-arrow{font-size:20px;color:var(--ink3);}
    .day-card-kcal{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;}
    .progress-wrap{padding:0 15px 13px;}
    .progress-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--ink3);margin-bottom:5px;font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.05em;}
    .progress-bg{height:3px;background:var(--cream2);border-radius:4px;overflow:hidden;}
    .progress-fill{height:100%;border-radius:4px;transition:width .4s ease;}
    #detail{display:none;position:relative;z-index:1;min-height:100vh;min-height:-webkit-fill-available;flex-direction:column;background:var(--cream);}
    #detail.active{display:flex;}
    .detail-hero{padding:env(safe-area-inset-top,44px) 20px 18px;border-bottom:1px solid var(--border);}
    .back-btn{display:inline-flex;align-items:center;gap:6px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);cursor:pointer;margin-bottom:14px;padding:4px 0;}
    .back-btn:active{opacity:.5;}
    .detail-eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--ink3);margin-bottom:2px;}
    .detail-title{font-family:'Barlow Condensed',sans-serif;font-size:62px;font-weight:900;text-transform:uppercase;line-height:.9;margin-bottom:10px;}
    .detail-stats{display:flex;gap:18px;margin-bottom:12px;}
    .stat-val{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;line-height:1;}
    .stat-lbl{font-size:10px;color:var(--ink3);font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.08em;text-transform:uppercase;}
    .kcal-bar-meta{display:flex;justify-content:space-between;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px;}
    .kcal-bar-bg{height:5px;background:var(--cream2);border-radius:4px;overflow:hidden;}
    .kcal-bar-fill{height:100%;border-radius:4px;transition:width .4s ease;}
    .detail-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px env(safe-area-inset-bottom,32px);}
    .sec-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--ink3);margin:20px 0 10px 4px;}
    .cardio-card{background:white;border:1px solid var(--border);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:13px;box-shadow:var(--shadow);}
    .cardio-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
    .cardio-info strong{display:block;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
    .cardio-info span{font-size:12px;color:var(--ink3);}
    .rules-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
    .rule-pill{background:white;border:1px solid var(--border);border-radius:12px;padding:10px 8px;text-align:center;box-shadow:var(--shadow);}
    .rule-val{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;line-height:1;margin-bottom:2px;}
    .rule-lbl{font-size:10px;color:var(--ink3);font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.05em;text-transform:uppercase;}
    .ex-list{display:flex;flex-direction:column;gap:8px;}
    .ex-card{background:white;border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);transition:opacity .2s;}
    .ex-card.done{opacity:.45;}
    .ex-card-top{display:flex;align-items:center;padding:12px 14px;gap:12px;cursor:pointer;}
    .ex-num{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;color:var(--cream3);width:28px;text-align:center;line-height:1;flex-shrink:0;}
    .ex-card.done .ex-num{color:var(--sage);}
    .ex-info{flex:1;}
    .ex-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;line-height:1.1;}
    .ex-meta{display:flex;gap:10px;margin-top:3px;}
    .ex-tag{font-size:11px;color:var(--ink3);font-family:'Barlow Condensed',sans-serif;font-weight:600;}
    .ex-kcal{font-size:11px;font-family:'Barlow Condensed',sans-serif;font-weight:700;}
    .ex-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--cream3);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:all .2s;}
    .ex-card.done .ex-check{background:var(--sage);border-color:var(--sage);color:white;}
    .ex-illus{padding:0 14px 12px;display:none;}
    .ex-illus.open{display:block;}
    .ex-illus svg{width:100%;height:auto;}
    .ex-note{font-size:12px;color:var(--ink3);margin-top:6px;line-height:1.5;font-style:italic;padding:6px 8px;background:var(--cream2);border-radius:8px;}
    .hiit-card{background:white;border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);}
    .hiit-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;border-bottom:1px solid var(--border);}
    .hiit-hdr-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;}
    .hiit-badge{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:20px;background:var(--cream2);color:var(--ink2);}
    .hiit-move{display:flex;align-items:center;justify-content:space-between;padding:10px 15px;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .2s;}
    .hiit-move:last-child{border-bottom:none;}
    .hiit-move.done{opacity:.4;}
    .hiit-move-l{display:flex;align-items:center;gap:10px;}
    .hiit-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .hiit-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
    .hiit-sub{font-size:10px;color:var(--ink3);font-style:italic;}
    .hiit-timing{font-size:11px;color:var(--ink3);font-family:'Barlow Condensed',sans-serif;font-weight:600;text-align:right;}
    .hiit-kcal{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;}
    .finisher{padding:11px 15px;font-size:12px;color:var(--ink3);border-top:1px solid var(--border);font-style:italic;}
    .rest-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;text-align:center;}
    .rest-title{font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:900;text-transform:uppercase;margin:20px 0 8px;}
    .rest-text{font-size:14px;color:var(--ink3);line-height:1.6;}
    .spacer{height:40px;}
  </style>
</head>
<body>
<div class="bg-doodles">

<div id="splash">
  <div class="home-header">
    <div class="home-eyebrow">Weekly Training Plan</div>
    <div class="home-title">Victor<br><span>Mac</span><br>Workout</div>
  </div>
  <div class="week-strip" id="weekStrip"></div>
  <div class="day-cards" id="dayCards"></div>
</div>

<div id="detail">
  <div class="detail-hero" id="detailHero">
    <div class="back-btn" onclick="goHome()">← Back</div>
    <div class="detail-eyebrow" id="dEyebrow"></div>
    <div class="detail-title" id="dTitle"></div>
    <div class="detail-stats" id="dStats"></div>
    <div id="dKcalBar"></div>
  </div>
  <div class="detail-body" id="detailBody"></div>
</div>

<script>
const KCAL={squats:8,split_squats:7,hip_thrusters:6,calf_raises:4,leg_ext:5,leg_curl:5,db_overhead_ext:5,zbar_tricep:5,cable_rope_pushdown:5,db_kickback:4,dips:7,shoulder_press:7,lateral_raise:4,front_raise:4,cable_upright_row:5,trap_cable:5,shoulder_rotation:3,db_curl:5,hammer_curl:5,incline_db_curl:5,zbar_21s:8,preacher_curl:5,flat_press_fly:7,incline_press_fly:7,decline_press_fly:7,chest_pullover:5,chest_close_grip:6,fly_machine:5,deadlift:10,lat_pulldown:6,cable_row:6,vbar_pulldown:6,hiit_mnt_climbers:9,hiit_jumping_jacks:7,hiit_med_ball_squat:8,hiit_plank:5,hiit_lateral:10,hiit_abs:5,hiit_leg_raises:6,hiit_side_bend:5,hiit_russian:6,hiit_front_raise_def:6,hiit_hanging_leg:7,hiit_pushup_burpee:12,hiit_wall_sit:6,hiit_kb_lunge_chop:11,hiit_kb_russian:8,hiit_kb_uppercut:9,hiit_kb_swing:10,hiit_kb_front:6};

const SVG_STANDING=`<svg viewBox="0 0 280 110" xmlns="http://www.w3.org/2000/svg"><text x="70" y="11" font-family="Barlow Condensed" font-size="9" font-weight="700" fill="#7A7A72" text-anchor="middle" letter-spacing="1">START</text><text x="210" y="11" font-family="Barlow Condensed" font-size="9" font-weight="700" fill="#7A7A72" text-anchor="middle" letter-spacing="1">PEAK</text><circle cx="70" cy="26" r="8" fill="none" stroke="#1A1A18" stroke-width="2"/><line x1="70" y1="34" x2="70" y2="68" stroke="#1A1A18" stroke-width="2"/><line x1="54" y1="48" x2="86" y2="48" stroke="#1A1A18" stroke-width="2"/><line x1="70" y1="68" x2="58" y2="96" stroke="#1A1A18" stroke-width="2"/><line x1="70" y1="68" x2="82" y2="96" stroke="#1A1A18" stroke-width="2"/><circle cx="210" cy="26" r="8" fill="none" stroke="#C4714A" stroke-width="2"/><line x1="210" y1="34" x2="210" y2="68" stroke="#C4714A" stroke-width="2"/><line x1="192" y1="53" x2="228" y2="53" stroke="#C4714A" stroke-width="2"/><line x1="192" y1="53" x2="185" y2="40" stroke="#C4714A" stroke-width="2"/><line x1="228" y1="53" x2="235" y2="40" stroke="#C4714A" stroke-width="2"/><line x1="210" y1="68" x2="198" y2="96" stroke="#C4714A" stroke-width="2"/><line x1="210" y1="68" x2="222" y2="96" stroke="#C4714A" stroke-width="2"/><line x1="140" y1="60" x2="162" y2="60" stroke="#C4A96B" stroke-width="1.5" stroke-dasharray="3,3"/><polygon points="162,56 170,60 162,64" fill="#C4A96B"/></svg>`;

function kcalPerSet(k){return KCAL[k]||5;}
function totalKcal(di){const d=DAYS[di];if(d.rest)return 0;let t=60;d.exercises.forEach(e=>t+=kcalPerSet(e.k)*3);if(d.hiit)d.hiit.moves.forEach(m=>t+=kcalPerSet(m.k)*3);return t;}
function earnedKcal(di){const d=DAYS[di];if(d.rest)return 60;let t=60;d.exercises.forEach((e,i)=>{if(ls(`ex_${di}_${i}`))t+=kcalPerSet(e.k)*3;});if(d.hiit)d.hiit.moves.forEach((m,i)=>{if(ls(`ht_${di}_${i}`))t+=kcalPerSet(m.k)*3;});return t;}
function prog(di){const d=DAYS[di];if(!d.exercises)return{done:0,total:0};let done=0,total=d.exercises.length+(d.hiit?d.hiit.moves.length:0);d.exercises.forEach((_,i)=>{if(ls(`ex_${di}_${i}`))done++;});if(d.hiit)d.hiit.moves.forEach((_,i)=>{if(ls(`ht_${di}_${i}`))done++;});return{done,total};}
function ls(k){return localStorage.getItem('vmw3_'+k)==='1';}
function toggle(k){ls(k)?localStorage.removeItem('vmw3_'+k):localStorage.setItem('vmw3_'+k,'1');}

function buildHome(){
  const strip=document.getElementById('weekStrip'),cards=document.getElementById('dayCards');
  strip.innerHTML='';cards.innerHTML='';
  DAYS.forEach((d,i)=>{
    const p=prog(i),allDone=p.total>0&&p.done===p.total;
    const dot=document.createElement('div');dot.className='week-dot';
    dot.innerHTML=`<div class="week-dot-circle" style="background:${allDone?d.color:d.color+'22'};border-color:${d.color};color:${allDone?'#fff':d.color}">${allDone?'✓':d.short.substring(0,2)}</div><div class="week-dot-label">${d.short}</div>`;
    dot.onclick=()=>openDay(i);strip.appendChild(dot);
    const card=document.createElement('div');card.className='day-card';
    const ke=earnedKcal(i),kt=totalKcal(i);
    card.innerHTML=`<div class="day-card-inner"><div class="day-card-accent" style="background:${d.color}22;color:${d.color}">${d.short.toUpperCase()}</div><div class="day-card-info"><div class="day-card-day">${d.day}</div><div class="day-card-muscle" style="color:${d.color}">${d.muscle}</div><div class="day-card-sub">${d.rest?'Rest & recover':(d.exercises?d.exercises.length+' exercises + HIIT':'')}</div></div><div class="day-card-right"><div class="day-card-arrow" style="color:${d.color}">›</div>${!d.rest?`<div class="day-card-kcal" style="color:${d.color}">${ke>60?ke+'/':''}${kt} kcal</div>`:''}</div></div>${!d.rest&&p.total>0?`<div class="progress-wrap"><div class="progress-meta"><span>${p.done}/${p.total} sets done</span><span>${Math.round(p.done/p.total*100)}%</span></div><div class="progress-bg"><div class="progress-fill" style="width:${p.done/p.total*100}%;background:${d.color}"></div></div></div>`:''}`;
    card.onclick=()=>openDay(i);cards.appendChild(card);
  });
}

let curDay=0;
function openDay(i){
  curDay=i;const d=DAYS[i];
  document.getElementById('dEyebrow').textContent=d.day;
  const t=document.getElementById('dTitle');t.textContent=d.muscle;t.style.color=d.color;
  updateDetailHeader(i);
  renderBody(i);
  document.getElementById('splash').style.display='none';
  const det=document.getElementById('detail');det.classList.add('active');det.scrollTop=0;
}

function updateDetailHeader(i){
  const d=DAYS[i];
  if(d.rest){document.getElementById('dStats').innerHTML='';document.getElementById('dKcalBar').innerHTML='';return;}
  const p=prog(i),ke=earnedKcal(i),kt=totalKcal(i);
  document.getElementById('dStats').innerHTML=`<div><div class="stat-val" style="color:${d.color}">${d.exercises.length}</div><div class="stat-lbl">Exercises</div></div><div><div class="stat-val" style="color:${d.color}">${p.done}/${p.total}</div><div class="stat-lbl">Sets done</div></div><div><div class="stat-val" style="color:${d.color}">${ke}</div><div class="stat-lbl">Kcal</div></div>`;
  document.getElementById('dKcalBar').innerHTML=`<div class="kcal-bar-meta"><span>Calories burned</span><span>${ke} / ${kt} kcal</span></div><div class="kcal-bar-bg"><div class="kcal-bar-fill" style="width:${Math.min(ke/kt*100,100)}%;background:${d.color}"></div></div>`;
}

function renderBody(i){
  const d=DAYS[i],body=document.getElementById('detailBody');
  body.innerHTML='';
  if(d.rest){body.innerHTML=`<div class="rest-wrap"><svg width="110" height="110" viewBox="0 0 110 110"><circle cx="55" cy="55" r="50" fill="${d.color}18" stroke="${d.color}" stroke-width="1.5"/><text x="55" y="50" font-family="Barlow Condensed" font-size="28" font-weight="900" fill="${d.color}" text-anchor="middle">ZZZ</text><text x="55" y="72" font-family="Barlow Condensed" font-size="12" font-weight="700" fill="${d.color}" text-anchor="middle" letter-spacing="1">REST DAY</text></svg><div class="rest-title">Sunday</div><div class="rest-text">Full recovery. Walk, stretch, eat well, sleep well.<br>Muscles grow when you rest — not when you train.</div></div>`;return;}
  body.innerHTML+=`<div class="sec-label">Cardio Warmup</div><div class="cardio-card"><div class="cardio-icon" style="background:${d.color}18">${d.cardio.icon}</div><div class="cardio-info"><strong>${d.cardio.name}</strong><span>${d.cardio.note}</span></div></div>`;
  body.innerHTML+=`<div class="sec-label">Session Rules</div><div class="rules-row"><div class="rule-pill"><div class="rule-val" style="color:${d.color}">3</div><div class="rule-lbl">Sets</div></div><div class="rule-pill"><div class="rule-val" style="color:${d.color}">8–12</div><div class="rule-lbl">Reps</div></div><div class="rule-pill"><div class="rule-val" style="color:${d.color}">Failure</div><div class="rule-lbl">Target</div></div></div>`;
  body.innerHTML+=`<div class="sec-label">${d.muscle} — ${d.exercises.length} Exercises</div><div class="ex-list" id="exL_${i}"></div>`;
  if(d.hiit){body.innerHTML+=`<div class="sec-label">HIIT — ${d.hiit.name}</div><div class="hiit-card"><div class="hiit-hdr"><div class="hiit-hdr-title">${d.hiit.name}</div><div class="hiit-badge">3 Sets Each</div></div><div id="hiitL_${i}"></div>${d.hiit.finisher?`<div class="finisher">${d.hiit.finisher}</div>`:''}</div>`;}
  body.innerHTML+='<div class="spacer"></div>';
  setTimeout(()=>{
    const el=document.getElementById(`exL_${i}`);
    if(el)d.exercises.forEach((ex,j)=>{
      const done=ls(`ex_${i}_${j}`);
      const svg=ILLUS[ex.i]||SVG_STANDING;
      const c=document.createElement('div');c.className='ex-card'+(done?' done':'');c.id=`ec_${i}_${j}`;
      c.innerHTML=`<div class="ex-card-top" onclick="tapEx(${i},${j})"><div class="ex-num">${j+1}</div><div class="ex-info"><div class="ex-name">${ex.name}</div><div class="ex-meta"><span class="ex-tag">${ex.sets}</span><span class="ex-kcal" style="color:${d.color}">~${kcalPerSet(ex.k)*3} kcal</span></div></div><div class="ex-check">${done?'✓':''}</div></div><div class="ex-illus" id="il_${i}_${j}">${svg}${ex.note?`<div class="ex-note">${ex.note}</div>`:''}</div>`;
      el.appendChild(c);
    });
    const hl=document.getElementById(`hiitL_${i}`);
    if(hl&&d.hiit)d.hiit.moves.forEach((m,k)=>{
      const done=ls(`ht_${i}_${k}`);
      const r=document.createElement('div');r.className='hiit-move'+(done?' done':'');r.id=`hm_${i}_${k}`;
      r.innerHTML=`<div class="hiit-move-l"><div class="hiit-dot" style="background:${d.hiit.color}"></div><div><div class="hiit-name">${m.name}</div>${m.note?`<div class="hiit-sub">${m.note}</div>`:''}</div></div><div class="hiit-timing">${m.t}<br><span class="hiit-kcal" style="color:${d.hiit.color}">~${kcalPerSet(m.k)*3} kcal</span></div>`;
      r.onclick=()=>{toggle(`ht_${i}_${k}`);r.classList.toggle('done');updateDetailHeader(i);buildHome();};
      hl.appendChild(r);
    });
  },0);
}

function tapEx(di,j){
  toggle(`ex_${di}_${j}`);
  const card=document.getElementById(`ec_${di}_${j}`);
  if(!card)return;
  card.classList.toggle('done');
  const chk=card.querySelector('.ex-check');if(chk)chk.textContent=ls(`ex_${di}_${j}`)?'✓':'';
  const il=document.getElementById(`il_${di}_${j}`);
  if(il&&!ls(`ex_${di}_${j}`))il.classList.toggle('open');
  updateDetailHeader(di);buildHome();
}

function goHome(){
  document.getElementById('detail').classList.remove('active');
  document.getElementById('splash').style.display='flex';
  buildHome();
}

buildHome();
</script>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');</script>
</body>
</html>
